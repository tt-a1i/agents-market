name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Validate dispatch version
        if: github.event_name == 'workflow_dispatch'
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "${{ inputs.version }}" != "$expected" ]; then
            echo "Workflow input version must match package.json: expected $expected, got ${{ inputs.version }}"
            exit 1
          fi
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run release:check
      - run: npm run release:artifacts -- --out ./release-artifacts --catalog-base-url "https://tt-a1i.github.io/agents-market" --release-tag "${{ steps.release.outputs.tag }}" --package "@agents-market/cli"
      - uses: actions/upload-artifact@v4
        with:
          name: agents-market-release-artifacts
          path: ./release-artifacts
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_tag="${{ steps.release.outputs.tag }}"
          gh release view "${release_tag}" >/dev/null 2>&1 || gh release create "${release_tag}" --title "${release_tag}" --notes "Agents Market ${release_tag}"
          gh release upload "${release_tag}" release-artifacts/*.tgz release-artifacts/npm/*.tgz release-artifacts/install.sh release-artifacts/SHA256SUMS release-artifacts/release-artifacts.json release-artifacts/registry.bundle.json --clobber
