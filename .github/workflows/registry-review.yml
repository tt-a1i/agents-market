name: Registry Review

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:

concurrency:
  group: registry-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  registry-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run registry submission gate
        run: node scripts/registry-submission-check.mjs --summary-json registry-submission-summary.json --summary-markdown registry-submission-summary.md
      - name: Write registry review summary
        if: always()
        run: cat registry-submission-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment registry review on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- agents-market-registry-review -->";
            const body = fs.existsSync("registry-submission-summary.md")
              ? fs.readFileSync("registry-submission-summary.md", "utf8")
              : `${marker}\n## Registry Review\n\n- Status: fail\n\n**Failure:** Registry review summary was not generated.\n`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });
              const existing = comments.find(
                (comment) => comment.user.type === "Bot" && comment.body?.includes(marker)
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                });
              }
            } catch (error) {
              core.warning(`Could not write registry review PR comment: ${error.message}`);
            }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: registry-submission-summary
          path: |
            registry-submission-summary.json
            registry-submission-summary.md
